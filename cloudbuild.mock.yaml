# Temporary mock-mode build config — no secrets, for initial deploy testing

substitutions:
  _SERVICE:  n3ware
  _REGION:   us-east1
  _REGISTRY: us-east1-docker.pkg.dev
  _SHA:      9f975e6

steps:
  # 1. Build the Docker image
  - name: gcr.io/cloud-builders/docker
    id: build
    args:
      - build
      - --tag
      - ${_REGISTRY}/${PROJECT_ID}/n3ware/${_SERVICE}:${_SHA}
      - --tag
      - ${_REGISTRY}/${PROJECT_ID}/n3ware/${_SERVICE}:latest
      - --cache-from
      - ${_REGISTRY}/${PROJECT_ID}/n3ware/${_SERVICE}:latest
      - --build-arg
      - BUILDKIT_INLINE_CACHE=1
      - .
    env:
      - DOCKER_BUILDKIT=1

  # 2. Push image to Artifact Registry
  - name: gcr.io/cloud-builders/docker
    id: push
    args:
      - push
      - --all-tags
      - ${_REGISTRY}/${PROJECT_ID}/n3ware/${_SERVICE}
    waitFor: [build]

  # 3. Deploy to Cloud Run (mock mode — no secrets)
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REGISTRY}/${PROJECT_ID}/n3ware/${_SERVICE}:${_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=10
      - --concurrency=80
      - --timeout=60
      - --set-env-vars=NODE_ENV=production,STORAGE_BACKEND=firestore,GOOGLE_CLOUD_PROJECT=$PROJECT_ID
      - --quiet
    waitFor: [push]

images:
  - ${_REGISTRY}/${PROJECT_ID}/n3ware/${_SERVICE}:${_SHA}
  - ${_REGISTRY}/${PROJECT_ID}/n3ware/${_SERVICE}:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

timeout: 1200s
