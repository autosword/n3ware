steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - '-t'
      - 'gcr.io/$PROJECT_ID/n3ware:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/n3ware:latest'
      - '.'

  # Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/n3ware:$COMMIT_SHA']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/n3ware:latest']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - n3ware
      - '--image=gcr.io/$PROJECT_ID/n3ware:$COMMIT_SHA'
      - '--region=us-east1'
      - '--platform=managed'
      - '--memory=512Mi'
      - '--max-instances=10'
      - '--allow-unauthenticated'
      - '--set-env-vars=NODE_ENV=production,STORAGE_BACKEND=firestore'

images:
  - 'gcr.io/$PROJECT_ID/n3ware:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/n3ware:latest'

options:
  logging: CLOUD_LOGGING_ONLY
