# Google Cloud Build — build and deploy n3ware to Cloud Run
#
# Required substitution variables (set in Cloud Build trigger or --substitutions):
#   _SERVICE     Cloud Run service name     (default: n3ware)
#   _REGION      Cloud Run region           (default: us-east1)
#   _REGISTRY    Artifact Registry host     (default: us-east1-docker.pkg.dev)
#
# Required IAM roles on the Cloud Build service account:
#   roles/run.admin
#   roles/iam.serviceAccountUser
#   roles/artifactregistry.writer
#   roles/secretmanager.secretAccessor  (to read secrets at deploy time)
#
# Secrets must be pre-created with scripts/setup-secrets.sh before first deploy.

substitutions:
  _SERVICE:  n3ware
  _REGION:   us-east1
  _REGISTRY: us-east1-docker.pkg.dev

steps:
  # 1. Build the Docker image
  - name: gcr.io/cloud-builders/docker
    id: build
    args:
      - build
      - --tag
      - ${_REGISTRY}/${PROJECT_ID}/n3ware/${_SERVICE}:${SHORT_SHA}
      - --tag
      - ${_REGISTRY}/${PROJECT_ID}/n3ware/${_SERVICE}:latest
      - --cache-from
      - ${_REGISTRY}/${PROJECT_ID}/n3ware/${_SERVICE}:latest
      - --build-arg
      - BUILDKIT_INLINE_CACHE=1
      - .
    env:
      - DOCKER_BUILDKIT=1

  # 2. Push image to Artifact Registry
  - name: gcr.io/cloud-builders/docker
    id: push
    args:
      - push
      - --all-tags
      - ${_REGISTRY}/${PROJECT_ID}/n3ware/${_SERVICE}
    waitFor: [build]

  # 3. Deploy to Cloud Run
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REGISTRY}/${PROJECT_ID}/n3ware/${_SERVICE}:${SHORT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=10
      - --concurrency=80
      - --timeout=60
      - --set-env-vars=NODE_ENV=production,STORAGE_BACKEND=firestore,GOOGLE_CLOUD_PROJECT=$PROJECT_ID
      - >-
        --set-secrets=JWT_SECRET=jwt-secret:latest,MASTER_API_KEY=master-api-key:latest,STRIPE_SECRET_KEY=stripe-secret-key:latest,STRIPE_WEBHOOK_SECRET=stripe-webhook-secret:latest,STRIPE_STARTER_PRICE_ID=stripe-starter-price-id:latest,STRIPE_PRO_PRICE_ID=stripe-pro-price-id:latest,STRIPE_AGENCY_PRICE_ID=stripe-agency-price-id:latest,SENDGRID_API_KEY=sendgrid-api-key:latest,CLOUDFLARE_API_TOKEN=cloudflare-api-token:latest,CLOUDFLARE_ACCOUNT_ID=cloudflare-account-id:latest,ANTHROPIC_API_KEY=anthropic-api-key:latest,GOOGLE_CLIENT_ID=google-client-id:latest,GOOGLE_CLIENT_SECRET=google-client-secret:latest
      - --quiet
    waitFor: [push]

images:
  - ${_REGISTRY}/${PROJECT_ID}/n3ware/${_SERVICE}:${SHORT_SHA}
  - ${_REGISTRY}/${PROJECT_ID}/n3ware/${_SERVICE}:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

timeout: 1200s
